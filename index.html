<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Learn Anything</title>
<style>
  :root {
    --ink: #1f2420;
    --paper: #f6f4ee;
    --moss: #3f5d47;
    --moss-dark: #2c4232;
    --clay: #a9603f;
    --line: #d9d3c4;
    --card: #ffffff;
  }
  body.dark {
    --ink: #e8e6df;
    --paper: #1a1d19;
    --moss: #6ea67e;
    --moss-dark: #8ec49b;
    --clay: #d68a63;
    --line: #333830;
    --card: #23271f;
  }
  body.dark .chip { background: var(--card); color: var(--ink); }
  body.dark input[type=text] { background: var(--card); color: var(--ink); border-color: var(--line); }
  body { transition: background-color 0.2s, color 0.2s; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 820px; margin: 0 auto; padding: 28px 20px 80px; }
  header.top {
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 2px solid var(--ink); padding-bottom: 14px; margin-bottom: 28px;
  }
  header.top h1 {
    font-size: 26px; margin: 0; letter-spacing: 0.5px; font-weight: 700;
  }
  header.top .tag {
    font-family: -apple-system, sans-serif; font-size: 11px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--moss); border: 1px solid var(--moss);
    padding: 4px 8px; border-radius: 2px;
  }
  .budget {
    font-family: -apple-system, sans-serif; font-size: 12px; color: #7a7568;
    margin-bottom: 24px; display: flex; gap: 6px; align-items: center;
  }
  .budget .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--moss); }
  .budget.warn .dot { background: var(--clay); }

  button {
    font-family: -apple-system, sans-serif; cursor: pointer; border: none;
    border-radius: 3px; font-size: 14px; padding: 10px 16px; font-weight: 600;
  }
  .btn-primary { background: var(--moss); color: white; }
  .btn-primary:hover { background: var(--moss-dark); }
  .btn-primary:disabled { background: #b9c2ba; cursor: default; }
  .btn-ghost { background: transparent; color: var(--moss); border: 1px solid var(--moss); }
  .btn-ghost:hover { background: #eef2ee; }
  input[type=text] {
    font-family: 'Iowan Old Style', Georgia, serif; font-size: 17px; padding: 12px 14px;
    border: 1px solid var(--line); border-radius: 3px; width: 100%; background: white;
  }
  input[type=text]:focus { outline: 2px solid var(--moss); outline-offset: 1px; }

  /* HOME */
  .home-grid { display: grid; gap: 14px; margin-bottom: 34px; }
  .topic-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 6px;
    padding: 16px 18px; display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; transition: border-color .15s;
  }
  .topic-card:hover { border-color: var(--moss); }
  .topic-card h3 { margin: 0 0 4px; font-size: 18px; }
  .topic-card .meta { font-family: -apple-system, sans-serif; font-size: 12px; color: #8a8578; }
  .progress-ring { display: flex; align-items: center; gap: 10px; }
  .bar-track { width: 90px; height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--moss); }
  .pct { font-family: -apple-system, sans-serif; font-size: 13px; color: var(--moss); font-weight: 700; }

  .new-topic-box {
    background: var(--card); border: 1px dashed var(--line); border-radius: 6px; padding: 22px;
  }
  .new-topic-box h2 { margin-top: 0; font-size: 19px; }
  .row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .chip-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .chip {
    font-family: -apple-system, sans-serif; font-size: 13px; padding: 7px 13px;
    border: 1px solid var(--line); border-radius: 20px; cursor: pointer; background: white;
  }
  .chip.selected { background: var(--moss); color: white; border-color: var(--moss); }
  label.field-label {
    font-family: -apple-system, sans-serif; font-size: 12px; text-transform: uppercase;
    letter-spacing: 1px; color: #8a8578; display: block; margin: 16px 0 4px;
  }

  /* CURRICULUM / LESSON view */
  .backlink {
    font-family: -apple-system, sans-serif; font-size: 13px; color: var(--moss);
    cursor: pointer; margin-bottom: 16px; display: inline-block;
  }
  .curric-title { font-size: 24px; margin: 0 0 4px; }
  .lesson-list { display: grid; gap: 8px; margin-top: 18px; }
  .lesson-row {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    border: 1px solid var(--line); border-radius: 5px; background: var(--card); cursor: pointer;
  }
  .lesson-row.locked { opacity: 0.5; cursor: default; }
  .lesson-row.done { border-color: var(--moss); }
  .lesson-num {
    font-family: -apple-system, sans-serif; font-size: 12px; width: 22px; height: 22px;
    border-radius: 50%; border: 1px solid var(--moss); color: var(--moss);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .lesson-row.done .lesson-num { background: var(--moss); color: white; }

  .lesson-view h2 { font-size: 24px; margin-bottom: 4px; }
  .lesson-body { line-height: 1.65; font-size: 16.5px; }
  .lesson-body h3 { font-size: 15px; text-transform: uppercase; letter-spacing: 1px; color: var(--moss); font-family: -apple-system, sans-serif; margin: 22px 0 6px; }
  .lesson-body p { margin: 0 0 12px; }
  .lesson-body ul, .lesson-body ol { margin: 0 0 12px 20px; }

  .chat-panel { margin-top: 26px; border-top: 1px solid var(--line); padding-top: 18px; }
  .chat-log { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .msg { padding: 10px 14px; border-radius: 6px; font-size: 15px; line-height: 1.5; max-width: 90%; }
  .msg.user { background: #eef2ee; align-self: flex-end; }
  .msg.ai { background: var(--card); border: 1px solid var(--line); align-self: flex-start; }
  .quick-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }

  .loading { font-family: -apple-system, sans-serif; color: #8a8578; font-size: 14px; padding: 20px 0; }
  .loading-skel {
    display: flex; align-items: center; gap: 10px; font-family: -apple-system, sans-serif;
    color: #8a8578; font-size: 14px; padding: 20px 0;
  }
  .spinner {
    width: 16px; height: 16px; border: 2px solid var(--line); border-top-color: var(--moss);
    border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .app > *:not(header) { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .error-box {
    background: #fbeee8; border: 1px solid var(--clay); color: #7a3a20; padding: 12px 14px;
    border-radius: 5px; font-family: -apple-system, sans-serif; font-size: 13.5px; margin: 14px 0;
  }
  .lesson-img {
    width: 100%; max-height: 260px; object-fit: cover; border-radius: 6px; margin-bottom: 16px;
    border: 1px solid var(--line);
  }
  img, svg { max-width: 100%; }

  @media (max-width: 600px) {
    .app { padding: 16px 14px 60px; }
    header.top { flex-direction: column; align-items: flex-start; gap: 8px; }
    header.top h1 { font-size: 21px; }
    .topic-card { flex-direction: column; align-items: flex-start; gap: 10px; }
    .progress-ring { width: 100%; }
    .bar-track { flex: 1; }
    .row { flex-direction: column; }
    .row button, .row input { width: 100%; }
    .chip { font-size: 12.5px; padding: 6px 11px; }
    .lesson-body { font-size: 16px; }
    .msg { max-width: 100%; }
    .quick-actions button { flex: 1 1 45%; font-size: 12.5px; padding: 8px 10px; }
  }
</style>
</head>
<body>
<div id="root" class="app"></div>

<script>
window.addEventListener("error", (e) => {
  const root = document.getElementById("root");
  if (root && !root.hasChildNodes()) {
    root.innerHTML = '<div style="font-family:-apple-system,sans-serif;padding:20px;color:#7a3a20;">' +
      '<h2 style="margin-top:0;">Something failed to load</h2>' +
      '<p style="font-size:14px;">' + (e.message || "Unknown error") + '</p>' +
      '<p style="font-size:13px;color:#8a8578;">Try opening this directly in the Claude app/chat rather than as a downloaded file — some mobile browsers block local scripts.</p>' +
      '</div>';
  }
});

// 👇 Paste your Cloudflare Worker URL here after you set it up (see cloudflare-worker.js instructions)
const WORKER_URL = "https://learn-anything-proxy.sadagopankrishnan.workers.dev";

// --- Lightweight, anonymous usage analytics (helps you see how testers use the app) ---
function getDeviceId() {
  let id = localStorage.getItem("learn-anything-device-id");
  if (!id) {
    id = "d_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem("learn-anything-device-id", id);
  }
  return id;
}
function track(type, extra = {}) {
  try {
    fetch(WORKER_URL + "/event", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ type, deviceId: getDeviceId(), clientTime: Date.now(), ...extra })
    }).catch(() => {}); // never let analytics affect the app
  } catch (e) { /* ignore */ }
}
const API_URL = WORKER_URL;
// Static safety net, used only if the live model list can't be fetched at all.
const FALLBACK_MODEL_CANDIDATES = [
  "openrouter/free",
  "meta-llama/llama-3.3-70b-instruct:free",
  "deepseek/deepseek-chat-v3.1:free"
];
let liveFreeModels = null; // populated on first use, cached for the session

// Rough speed heuristic: smaller models (by params hinted in the id) respond faster.
// We don't have real latency data client-side, so this is a best-effort ordering,
// not a guarantee — quality still comes from whichever model actually answers.
function bySpeedHint(ids) {
  const sizeOf = (id) => {
    const m = id.match(/(\d+)(b|B)(?!.*\d)/); // e.g. "8b", "70b" — last size-like token
    return m ? parseInt(m[1], 10) : 999; // unknown size sorts last (assume it's a big/slow one)
  };
  return [...ids].sort((a, b) => sizeOf(a) - sizeOf(b));
}

async function getFreeModelList() {
  if (liveFreeModels) return liveFreeModels;
  try {
    const res = await fetch("https://openrouter.ai/api/v1/models");
    const data = await res.json();
    const free = (data.data || [])
      .filter(m => m.id && m.id.endsWith(":free") &&
        parseFloat(m.pricing?.prompt || "1") === 0 &&
        parseFloat(m.pricing?.completion || "1") === 0)
      .map(m => m.id);
    const fastFirst = bySpeedHint(free).slice(0, 6);
    // Auto-router first (self-selects a live free model), then fastest-looking real ones as backup
    liveFreeModels = ["openrouter/free", ...fastFirst];
    if (liveFreeModels.length <= 1) liveFreeModels = FALLBACK_MODEL_CANDIDATES;
  } catch (e) {
    liveFreeModels = FALLBACK_MODEL_CANDIDATES;
  }
  return liveFreeModels;
}


// Free tier is roughly 15-40 messages per rolling 5-hour window (OpenRouter's own
// free-model limits are separate: ~50/day, 20/min). We show an estimate, not a guarantee.
const ASSUMED_BUDGET = 40;

const DAILY_FREE_LIMIT = 50; // OpenRouter's published free-tier daily cap (approximate, may vary)
const COUNTRIES = ["Global / none", "United States", "United Kingdom", "India", "Nigeria", "Philippines", "Canada", "Australia", "South Africa", "Kenya", "Pakistan", "Brazil", "Mexico", "Germany", "France", "Indonesia", "Other"];

let state = {
  view: "home",       // home | new | curriculum | lesson
  topics: {},          // id -> {id,title,level,style,country,lessons:[{title,content,quiz,done,imageUrl}], activeIndex, createdAt}
  activeTopicId: null,
  activeLessonIndex: null,
  newTopicDraft: { title: "", level: "Beginner", style: "examples", country: "Global / none", step: 1 },
  chatByLesson: {},    // "topicId:lessonIdx" -> [{role,text}]
  loading: false,
  loadingMsg: "",
  error: null,
  msgCount: 0,
  quotaUsedToday: 0,
  quotaDate: null,
  streakCount: 0,
  lastActiveDate: null
};

function render() { App(); }

async function loadTopics() {
  try {
    const raw = localStorage.getItem("learn-anything-topics");
    if (raw) state.topics = JSON.parse(raw);
    const streakRaw = localStorage.getItem("learn-anything-streak");
    if (streakRaw) {
      const s = JSON.parse(streakRaw);
      state.streakCount = s.count || 0;
      state.lastActiveDate = s.lastDate || null;
    }
  } catch (e) { /* no data yet, or storage unavailable (e.g. private browsing) */ }
  updateStreak();
  render();
}

function updateStreak() {
  const today = new Date().toDateString();
  if (state.lastActiveDate === today) return; // already counted today
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (state.lastActiveDate === yesterday) {
    state.streakCount += 1; // kept the streak going
  } else {
    state.streakCount = 1; // streak broken or first ever visit
  }
  state.lastActiveDate = today;
  try {
    localStorage.setItem("learn-anything-streak", JSON.stringify({ count: state.streakCount, lastDate: today }));
  } catch (e) { /* ignore */ }
  track("daily_open", { streak: state.streakCount });
}

async function saveTopics() {
  try {
    localStorage.setItem("learn-anything-topics", JSON.stringify(state.topics));
  } catch (e) { console.error("save failed", e); }
}

function bumpMsgCount() { state.msgCount++; }

function cleanText(s) {
  if (!s) return s;
  return s
    .replace(/\*\*(.*?)\*\*/g, "$1")   // **bold**
    .replace(/\*(.*?)\*/g, "$1")       // *italic*
    .replace(/^\*+|\*+$/g, "")         // stray leading/trailing asterisks
    .trim();
}

async function callAI(messages, { json = false } = {}) {
  bumpMsgCount();
  let lastErr = null;
  const candidates = await getFreeModelList();
  for (const model of candidates) {
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model, messages, temperature: 0.7 })
      });
      if (!res.ok) {
        const t = await res.text().catch(()=> "");
        throw new Error("API error " + res.status + ": " + t.slice(0,200));
      }
      const data = await res.json();
      const content = data?.choices?.[0]?.message?.content;
      if (!content) throw new Error("Empty response from model");
      if (json) {
        let cleaned = content.trim().replace(/^```json/i, "").replace(/^```/, "").replace(/```$/, "").trim();
        return JSON.parse(cleaned);
      }
      return content;
    } catch (e) {
      lastErr = e;
      // try next candidate model
    }
  }
  throw lastErr || new Error("All model candidates failed");
}

// ---------- Actions ----------

async function generateCurriculum() {
  const draft = state.newTopicDraft;
  if (!draft.title.trim()) return;
  state.loading = true;
  state.loadingMsg = "Building your curriculum...";
  state.error = null;
  render();

  const sys = `You are a curriculum designer. Given a topic, learner level, and learning style, output ONLY valid JSON (no markdown fences, no commentary) with this exact shape:
{"lessons": [{"title": "string"}]}
Produce 6 to 9 lessons that form a logical learning sequence from foundational to more advanced, appropriate for the stated level. Keep titles short and concrete.`;
  const countryLine = draft.country ? `\nLearner's country: ${draft.country} (prefer this context where relevant for later lesson examples, not necessarily in titles)` : "";
  const user = `Topic: ${draft.title}\nLearner level: ${draft.level}\nPreferred learning style: ${draft.style}${countryLine}`;

  try {
    const result = await callAI([
      { role: "system", content: sys },
      { role: "user", content: user }
    ], { json: true });

    const id = "t_" + Date.now();
    state.topics[id] = {
      id,
      title: draft.title.trim(),
      level: draft.level,
      style: draft.style,
      country: draft.country || "",
      createdAt: Date.now(),
      lessons: result.lessons.map(l => ({ title: l.title, content: null, done: false }))
    };
    await saveTopics();
    state.activeTopicId = id;
    state.view = "curriculum";
    track("topic_created", { topic: draft.title.trim(), level: draft.level, style: draft.style });
    prefetchNextLesson({ ...state.topics[id], id }, -1); // starts lesson 1 generating silently while they view the curriculum list
    state.newTopicDraft = { title: "", level: "Beginner", style: "examples", country: draft.country, step: 1 };
  } catch (e) {
    state.error = friendlyError(e);
  }
  state.loading = false;
  render();
}

async function openReviewLesson(topicId) {
  const topic = state.topics[topicId];
  const weakQuestions = (topic.profile?.weak || []).slice(-8).map(w => w.question);
  if (weakQuestions.length === 0) return;

  // Create (or reuse) a special review lesson slot at the end of the lessons array
  let reviewIdx = topic.lessons.findIndex(l => l.isReview);
  if (reviewIdx === -1) {
    topic.lessons.push({ title: "Review: your weak spots", isReview: true, content: null, done: false });
    reviewIdx = topic.lessons.length - 1;
  } else {
    topic.lessons[reviewIdx].content = null; // regenerate fresh each time, since weak spots change
  }

  state.activeTopicId = topicId;
  state.activeLessonIndex = reviewIdx;
  state.view = "lesson";
  state.loading = true;
  state.loadingMsg = "Building your review...";
  state.error = null;
  render();

  const sys = `You are a tutor building a short REVIEW lesson that re-teaches specific concepts a learner has been getting wrong, using a fresh angle (different example/analogy than before) so it clicks this time. Output ONLY valid JSON (no markdown fences) with this shape:
{"content_html": "string of simple HTML using <p>,<h3>,<ul>,<li>,<strong>,<em> only", "quiz": [{"question":"string","options":["a","b","c","d"],"correctIndex":0,"explanation":"string"}]}
Keep it short (under 5 minutes to read). Address each concept briefly, then give 2-3 quiz questions re-testing them. Do not use markdown asterisks. Write for a "${topic.level}" learner.`;
  const user = `Topic: ${topic.title}\nConcepts/questions the learner previously missed:\n${weakQuestions.map((q,i) => (i+1)+". "+q).join("\n")}`;

  try {
    const result = await callAI([
      { role: "system", content: sys },
      { role: "user", content: user }
    ], { json: true });
    topic.lessons[reviewIdx].content = result.content_html;
    topic.lessons[reviewIdx].quiz = (result.quiz || []).map(q => ({
      ...q,
      question: cleanText(q.question),
      options: q.options.map(cleanText),
      explanation: cleanText(q.explanation)
    }));
    await saveTopics();
  } catch (e) {
    state.error = friendlyError(e);
  }
  state.loading = false;
  render();
}

async function openDailyReview(topicId) {
  const topic = state.topics[topicId];
  const due = dueForReview(topic);
  if (due.length === 0) return;
  const questions = due.map(d => d.question);

  let reviewIdx = topic.lessons.findIndex(l => l.isDailyReview);
  if (reviewIdx === -1) {
    topic.lessons.push({ title: "Daily Review", isDailyReview: true, content: null, done: false });
    reviewIdx = topic.lessons.length - 1;
  } else {
    topic.lessons[reviewIdx].content = null;
  }

  state.activeTopicId = topicId;
  state.activeLessonIndex = reviewIdx;
  state.view = "lesson";
  state.loading = true;
  state.loadingMsg = "Building your daily review...";
  state.error = null;
  render();

  const sys = `You are a tutor running a quick SPACED-REPETITION review — the learner already knows these concepts well, this is just a light refresher quiz to keep them sharp, not a re-teaching session. Output ONLY valid JSON (no markdown fences) with this shape:
{"content_html": "string of simple HTML using <p>,<h3>,<ul>,<li>,<strong>,<em> only", "quiz": [{"question":"string","options":["a","b","c","d"],"correctIndex":0,"explanation":"string"}]}
content_html should be a short 2-3 sentence friendly intro only ("Let's make sure this is still sticking..."), not a full lesson. Then include a quiz question for EACH concept listed below, worded a little differently than before so it's not just rote recall. Do not use markdown asterisks.`;
  const user = `Topic: ${topic.title}\nConcepts to briefly re-test:\n${questions.map((q,i) => (i+1)+". "+q).join("\n")}`;

  try {
    const result = await callAI([
      { role: "system", content: sys },
      { role: "user", content: user }
    ], { json: true });
    topic.lessons[reviewIdx].content = result.content_html;
    topic.lessons[reviewIdx].quiz = (result.quiz || []).map(q => ({
      ...q,
      question: cleanText(q.question),
      options: q.options.map(cleanText),
      explanation: cleanText(q.explanation)
    }));
    await saveTopics();
    track("daily_review_opened", { topic: topic.title, count: questions.length });
  } catch (e) {
    state.error = friendlyError(e);
  }
  state.loading = false;
  render();
}

async function generateLessonContent(topic, lesson, idx) {
  const priorTitles = topic.lessons.slice(0, idx).map(l => l.title).join(", ") || "none";
  const countryLine = topic.country ? ` Use examples, references, units, currency, and illustrations relevant to ${topic.country} wherever it naturally fits the topic.` : "";
  const memoryLine = profileSummary(topic);
  const sys = `You are a patient, engaging tutor writing a single self-contained MICRO-LESSON meant to be read in under 5 minutes — think bite-sized daily lesson, not a textbook chapter. Output ONLY valid JSON (no markdown fences) with this shape:
{"content_html": "string of simple HTML using <p>,<h3>,<ul>,<li>,<strong>,<em> only", "quiz": [{"question":"string","options":["a","b","c","d"],"correctIndex":0,"explanation":"string"}]}
The content_html should include sections (use <h3> headers): Introduction, an Example, an Analogy, then a short Practice/Summary. Keep each section to 2-4 short sentences — total reading time under 5 minutes. Write for a "${topic.level}" learner who prefers a "${topic.style}" style.${countryLine}${memoryLine} Include 2-3 quiz questions at the end (in the quiz array, not in content_html). Do not use markdown asterisks for bold/italic — use the actual HTML tags instead.`;
  const user = `Topic: ${topic.title}\nLesson: "${lesson.title}"\nLessons already covered: ${priorTitles}`;

  const result = await callAI([
    { role: "system", content: sys },
    { role: "user", content: user }
  ], { json: true });

  lesson.content = result.content_html;
  lesson.quiz = (result.quiz || []).map(q => ({
    ...q,
    question: cleanText(q.question),
    options: q.options.map(cleanText),
    explanation: cleanText(q.explanation)
  }));
  lesson.imageUrl = await fetchLessonImage(topic.title + " " + lesson.title); // free, keyless, no AI cost
  await saveTopics();
}

let prefetchInFlight = new Set(); // guards against double-prefetching the same lesson
let prefetchStatus = {}; // "topicId:idx" -> "loading" | "done", purely for the visible indicator

// Silently generates the next lesson in the background while the learner is still
// reading the current one. Never touches loading/error state — if it fails, the
// lesson simply generates normally (visibly) whenever they actually open it.
function prefetchNextLesson(topic, idx) {
  const nextIdx = idx + 1;
  const next = topic.lessons[nextIdx];
  const key = topic.id + ":" + nextIdx;
  if (!next || next.content || prefetchInFlight.has(key)) return;
  prefetchInFlight.add(key);
  prefetchStatus[key] = "loading";
  render();
  generateLessonContent(topic, next, nextIdx)
    .then(() => { prefetchStatus[key] = "done"; render(); })
    .catch(() => { delete prefetchStatus[key]; /* will just generate normally on demand later */ })
    .finally(() => prefetchInFlight.delete(key));
}

async function openLesson(topicId, idx) {
  state.activeTopicId = topicId;
  state.activeLessonIndex = idx;
  state.view = "lesson";
  state.error = null;
  const topic = state.topics[topicId];
  topic.lastOpenedIndex = idx;
  topic.lastOpenedAt = Date.now();
  saveTopics();
  render();

  const lesson = topic.lessons[idx];
  if (lesson.content) {
    prefetchNextLesson(topic, idx); // already cached — get a head start on the one after
    return;
  }

  state.loading = true;
  state.loadingMsg = "Writing this lesson...";
  render();

  try {
    await generateLessonContent(topic, lesson, idx);
    prefetchNextLesson(topic, idx); // now that this one's done, quietly start the next
  } catch (e) {
    state.error = friendlyError(e);
  }
  state.loading = false;
  render();
}

function markLessonDone(topicId, idx) {
  const topic = state.topics[topicId];
  topic.lessons[idx].done = true;
  saveTopics();
  track("lesson_completed", { topic: topic.title, lesson: topic.lessons[idx].title });
  render();
}

// Records right/wrong answers per topic so future lessons and chat can reinforce weak areas.
// Backward compatible: old saved topics won't have this field until their first new answer.
function recordQuizAnswer(topicId, lessonTitle, question, wasCorrect) {
  const topic = state.topics[topicId];
  if (!topic.profile) topic.profile = { weak: [], strong: [] };
  const entry = { lesson: lessonTitle, question, at: Date.now() };
  if (wasCorrect) {
    topic.profile.strong.push(entry);
    // if they'd previously missed this same question, clear it from weak list — they've got it now
    topic.profile.weak = topic.profile.weak.filter(w => w.question !== question);
  } else {
    // avoid duplicate entries for the same question
    if (!topic.profile.weak.some(w => w.question === question)) topic.profile.weak.push(entry);
  }
  // keep lists from growing unbounded
  topic.profile.weak = topic.profile.weak.slice(-15);
  topic.profile.strong = topic.profile.strong.slice(-30);
  saveTopics();
}

// Turns a topic's tracked performance into a short line for AI prompts.
function profileSummary(topic) {
  const p = topic.profile;
  if (!p || (p.weak.length === 0 && p.strong.length === 0)) return "";
  const weakLine = p.weak.length
    ? `The learner has struggled with: ${p.weak.slice(-6).map(w => w.question).join("; ")}. Reinforce these concepts naturally where relevant, without calling out that they got them wrong before.`
    : "";
  const paceLine = p.strong.length >= 4 && p.weak.length === 0
    ? " This learner has been answering confidently — feel free to move a bit faster and go slightly deeper."
    : "";
  return " " + weakLine + paceLine;
}

function weakConceptTitles(topic) {
  if (!topic.profile || !topic.profile.weak.length) return [];
  // unique lesson titles that have an open weak spot
  return [...new Set(topic.profile.weak.map(w => w.lesson))];
}

// Spaced repetition: things answered correctly are "due" for a refresher review
// after a few days, so they move to long-term memory instead of fading.
const REVIEW_DUE_AFTER_MS = 3 * 24 * 60 * 60 * 1000; // 3 days
function dueForReview(topic) {
  const p = topic.profile;
  if (!p || !p.strong.length) return [];
  const cutoff = Date.now() - REVIEW_DUE_AFTER_MS;
  // Keep only the most recent correct-answer timestamp per question
  const latestByQuestion = {};
  for (const s of p.strong) {
    if (!latestByQuestion[s.question] || s.at > latestByQuestion[s.question].at) latestByQuestion[s.question] = s;
  }
  return Object.values(latestByQuestion).filter(s => s.at < cutoff).slice(-8);
}
function anyTopicDueForReview() {
  return Object.values(state.topics).find(t => dueForReview(t).length > 0) || null;
}

async function sendChat(topicId, idx, text, quickAction) {
  const key = topicId + ":" + idx;
  if (!state.chatByLesson[key]) state.chatByLesson[key] = [];
  const log = state.chatByLesson[key];
  const userText = quickAction || text;
  if (!userText.trim()) return;
  log.push({ role: "user", text: userText });
  state.loading = true;
  state.loadingMsg = "Thinking...";
  state.error = null;
  render();

  const topic = state.topics[topicId];
  const lesson = topic.lessons[idx];
  const countryLine = topic.country ? ` Where helpful, use examples relevant to ${topic.country}.` : "";
  const sys = `You are a friendly tutor helping a learner with the lesson "${lesson.title}" (topic: ${topic.title}, level: ${topic.level}). The lesson content was:\n${stripHtml(lesson.content).slice(0,1500)}\nAnswer the learner's question or request concisely and clearly, matching their level.${countryLine} Write in short paragraphs (2-4 sentences each), separated by a blank line, so it's easy to read on a phone. Plain text only, no markdown asterisks, no bullet symbols, no fences.`;

  const history = log.slice(-6).map(m => ({ role: m.role === "user" ? "user" : "assistant", content: m.text }));

  try {
    const reply = await callAI([
      { role: "system", content: sys },
      ...history
    ]);
    log.push({ role: "ai", text: cleanText(reply) });
  } catch (e) {
    state.error = friendlyError(e);
    log.pop(); // remove the unanswered user message from view? keep it but show error
    log.push({ role: "user", text: userText, failed: true });
  }
  state.loading = false;
  render();
}

async function fetchLessonImage(query) {
  try {
    const url = "https://en.wikipedia.org/w/api.php?action=query&format=json&generator=search&gsrsearch=" +
      encodeURIComponent(query) + "&gsrlimit=1&prop=pageimages&piprop=thumbnail&pithumbsize=600&origin=*";
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    const pages = data?.query?.pages;
    if (!pages) return null;
    const first = Object.values(pages)[0];
    return first?.thumbnail?.source || null;
  } catch (e) {
    return null; // images are a nice-to-have, never block the lesson on this
  }
}

function stripHtml(html) {
  const d = document.createElement("div");
  d.innerHTML = html || "";
  return d.textContent || "";
}

function friendlyError(e) {
  const msg = (e && e.message) || "";
  const low = msg.toLowerCase();
  if (low.includes("429") || low.includes("rate")) {
    return "Hit the free-tier rate limit on OpenRouter. Wait a bit and try again — nothing was lost, your progress is saved.";
  }
  if (low.includes("404") || low.includes("not available for free") || low.includes("402")) {
    return "All the free models tried were temporarily unavailable. This usually resolves within a minute or two — try again shortly.";
  }
  if (low.includes("failed to fetch") || low.includes("load failed") || low.includes("networkerror")) {
    return "Couldn't reach the server (network error: \"" + msg.slice(0,100) + "\"). If this keeps happening on one specific device/browser, that detail helps track it down.";
  }
  return "Something went wrong reaching the AI (" + msg.slice(0,120) + "). Your progress is saved — try again in a moment.";
}

function topicProgress(topic) {
  const total = topic.lessons.length;
  const done = topic.lessons.filter(l => l.done).length;
  return Math.round((done / total) * 100);
}

function App() {
  const root = document.getElementById("root");
  root.innerHTML = "";

  const isDark = document.body.classList.contains("dark");
  const header = el("header", { class: "top" }, [
    el("h1", {}, "Learn Anything"),
    el("div", { style: "display:flex;align-items:center;gap:10px;" }, [
      el("span", { class: "tag" }, state.streakCount > 0 ? `🔥 ${state.streakCount} day${state.streakCount===1?"":"s"}` : "personal edition"),
      el("button", { onclick: toggleTheme, style: "background:none;border:1px solid var(--line);border-radius:50%;width:30px;height:30px;font-size:14px;padding:0;cursor:pointer;" }, isDark ? "☀️" : "🌙")
    ])
  ]);
  root.appendChild(header);

  const used = state.msgCount;
  const remaining = Math.max(ASSUMED_BUDGET - used, 0);
  const budgetWarn = remaining <= 8;
  root.appendChild(el("div", { class: "budget" + (budgetWarn ? " warn" : "") }, [
    el("span", { class: "dot" }),
    el("span", {}, `~${remaining} of ~${ASSUMED_BUDGET} AI exchanges left this window (estimate, free tier varies) · lessons are cached once generated, so revisiting them is free`)
  ]));

  if (state.error) {
    root.appendChild(el("div", { class: "error-box" }, state.error));
  }

  if (state.loading) {
    root.appendChild(el("div", { class: "loading-skel" }, [
      el("div", { class: "spinner" }),
      el("span", {}, state.loadingMsg)
    ]));
  }

  if (state.view === "home") root.appendChild(HomeView());
  if (state.view === "new") root.appendChild(NewTopicView());
  if (state.view === "curriculum") root.appendChild(CurriculumView());
  if (state.view === "lesson") root.appendChild(LessonView());
}

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  for (const k in attrs || {}) {
    if (k === "class") e.className = attrs[k];
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  if (typeof children === "string") e.textContent = children;
  else if (Array.isArray(children)) children.forEach(c => c && e.appendChild(typeof c === "string" ? document.createTextNode(c) : c));
  else if (children instanceof Node) e.appendChild(children);
  return e;
}

function HomeView() {
  const wrap = document.createDocumentFragment();
  const topics = Object.values(state.topics).sort((a,b) => b.createdAt - a.createdAt);

  const reviewTopic = anyTopicDueForReview();
  if (reviewTopic) {
    const dueCount = dueForReview(reviewTopic).length;
    const reviewCard = el("div", {
      class: "topic-card",
      style: "background:var(--clay);color:white;border:none;margin-bottom:14px;",
      onclick: () => openDailyReview(reviewTopic.id)
    }, [
      el("div", {}, [
        el("div", { style: "font-family:-apple-system,sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:0.85;margin-bottom:4px;" }, "🧠 Daily review ready"),
        el("h3", { style: "margin:0 0 2px;color:white;" }, reviewTopic.title),
        el("div", { class: "meta", style: "color:rgba(255,255,255,0.85);" }, `${dueCount} concept${dueCount===1?"":"s"} to keep sharp`)
      ]),
      el("span", { style: "font-size:20px;" }, "→")
    ]);
    wrap.appendChild(reviewCard);
  }

  const withActivity = topics.filter(t => t.lastOpenedAt).sort((a,b) => b.lastOpenedAt - a.lastOpenedAt);
  if (withActivity.length > 0) {
    const t = withActivity[0];
    const idx = Math.min(t.lastOpenedIndex ?? 0, t.lessons.length - 1);
    const lesson = t.lessons[idx];
    const continueCard = el("div", {
      class: "topic-card",
      style: "background:var(--moss);color:white;border:none;margin-bottom:18px;",
      onclick: () => openLesson(t.id, idx)
    }, [
      el("div", {}, [
        el("div", { style: "font-family:-apple-system,sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:0.85;margin-bottom:4px;" }, "Continue learning"),
        el("h3", { style: "margin:0 0 2px;color:white;" }, t.title),
        el("div", { class: "meta", style: "color:rgba(255,255,255,0.8);" }, lesson.title)
      ]),
      el("span", { style: "font-size:20px;" }, "→")
    ]);
    wrap.appendChild(continueCard);
  }

  const grid = el("div", { class: "home-grid" });
  if (topics.length === 0) {
    grid.appendChild(el("div", { class: "loading" }, "No topics yet — start one below."));
  }
  topics.forEach(t => {
    const pct = topicProgress(t);
    const card = el("div", { class: "topic-card", onclick: () => { state.activeTopicId = t.id; state.view = "curriculum"; render(); } }, [
      el("div", {}, [
        el("h3", {}, t.title),
        el("div", { class: "meta" }, `${t.level} · ${t.lessons.length} lessons`)
      ]),
      el("div", { class: "progress-ring" }, [
        el("div", { class: "bar-track" }, el("div", { class: "bar-fill", style: `width:${pct}%` })),
        el("span", { class: "pct" }, pct + "%")
      ])
    ]);
    grid.appendChild(card);
  });
  wrap.appendChild(grid);

  const startBtn = el("button", { class: "btn-primary", onclick: () => { state.newTopicDraft.step = 1; state.view = "new"; render(); } }, "+ Start a new topic");
  wrap.appendChild(startBtn);
  return wrap;
}

function NewTopicView() {
  const wrap = document.createDocumentFragment();
  const step = state.newTopicDraft.step || 1;
  const totalSteps = 4;

  wrap.appendChild(el("span", { class: "backlink", onclick: () => {
    if (step > 1) { state.newTopicDraft.step = step - 1; render(); }
    else { state.view = "home"; render(); }
  } }, "← Back"));

  const stepper = el("div", { style: "font-family:-apple-system,sans-serif;font-size:12px;color:#8a8578;margin-bottom:10px;" }, `Step ${step} of ${totalSteps}`);
  wrap.appendChild(stepper);

  const box = el("div", { class: "new-topic-box" });

  if (step === 1) {
    box.appendChild(el("h2", {}, "What do you want to learn?"));
    const input = el("input", { type: "text", placeholder: "e.g. Comparative religion, Roman history, guitar..." });
    input.value = state.newTopicDraft.title;
    input.addEventListener("input", e => { state.newTopicDraft.title = e.target.value; });
    box.appendChild(input);
    const row = el("div", { class: "row" });
    const next = el("button", { class: "btn-primary" }, "Next");
    next.addEventListener("click", () => {
      if (!state.newTopicDraft.title.trim()) return;
      state.newTopicDraft.step = 2; render();
    });
    row.appendChild(next);
    box.appendChild(row);

  } else if (step === 2) {
    box.appendChild(el("h2", {}, `How familiar are you with ${state.newTopicDraft.title}?`));
    const levels = ["Never heard of it", "Beginner", "Intermediate", "Advanced", "Expert"];
    const levelGroup = el("div", { class: "chip-group" });
    levels.forEach(lv => {
      const chip = el("div", { class: "chip" + (state.newTopicDraft.level === lv ? " selected" : ""), onclick: () => { state.newTopicDraft.level = lv; render(); } }, lv);
      levelGroup.appendChild(chip);
    });
    box.appendChild(levelGroup);
    const row = el("div", { class: "row" });
    const next = el("button", { class: "btn-primary" }, "Next");
    next.addEventListener("click", () => { state.newTopicDraft.step = 3; render(); });
    row.appendChild(next);
    box.appendChild(row);

  } else if (step === 3) {
    box.appendChild(el("h2", {}, "How do you learn best?"));
    const styles = ["stories", "examples", "analogies", "practical", "project-based", "visuals"];
    const styleGroup = el("div", { class: "chip-group" });
    styles.forEach(s => {
      const chip = el("div", { class: "chip" + (state.newTopicDraft.style === s ? " selected" : ""), onclick: () => { state.newTopicDraft.style = s; render(); } }, s);
      styleGroup.appendChild(chip);
    });
    box.appendChild(styleGroup);
    box.appendChild(el("label", { class: "field-label" }, "Your country (optional — tailors examples & illustrations)"));
    const countryInput = el("input", { type: "text", placeholder: "e.g. India, Nigeria, Brazil..." });
    countryInput.value = state.newTopicDraft.country;
    countryInput.addEventListener("input", e => { state.newTopicDraft.country = e.target.value; });
    box.appendChild(countryInput);
    const row = el("div", { class: "row" });
    const next = el("button", { class: "btn-primary" }, "Next");
    next.addEventListener("click", () => { state.newTopicDraft.step = 4; render(); });
    row.appendChild(next);
    box.appendChild(row);

  } else if (step === 4) {
    box.appendChild(el("h2", {}, "Ready to build your curriculum"));
    const d = state.newTopicDraft;
    const summary = el("div", { style: "font-family:-apple-system,sans-serif;font-size:14px;color:#4a463c;line-height:1.8;margin-bottom:16px;" }, [
      el("div", {}, `📚 Topic: ${d.title}`),
      el("div", {}, `🎯 Level: ${d.level}`),
      el("div", {}, `🎨 Style: ${d.style}`),
      d.country ? el("div", {}, `🌍 Examples from: ${d.country}`) : null
    ]);
    box.appendChild(summary);
    const row = el("div", { class: "row" });
    const genBtn = el("button", { class: "btn-primary" }, "Generate curriculum");
    genBtn.disabled = state.loading;
    genBtn.addEventListener("click", generateCurriculum);
    row.appendChild(genBtn);
    box.appendChild(row);
  }

  wrap.appendChild(box);
  return wrap;
}

function CurriculumView() {
  const wrap = document.createDocumentFragment();
  const topic = state.topics[state.activeTopicId];
  if (!topic) { state.view = "home"; return wrap; }

  wrap.appendChild(el("span", { class: "backlink", onclick: () => { state.view = "home"; render(); } }, "← All topics"));
  wrap.appendChild(el("h2", { class: "curric-title" }, topic.title));
  wrap.appendChild(el("div", { class: "meta", style: "font-family:-apple-system,sans-serif;font-size:13px;color:#8a8578;" }, `${topic.level} · ${topic.style} style${topic.country ? " · " + topic.country + " examples" : ""} · ${topicProgress(topic)}% complete`));

  const list = el("div", { class: "lesson-list" });
  topic.lessons.forEach((lesson, idx) => {
    const row = el("div", { class: "lesson-row" + (lesson.done ? " done" : ""), onclick: () => openLesson(topic.id, idx) }, [
      el("div", { class: "lesson-num" }, lesson.done ? "✓" : String(idx+1)),
      el("div", {}, lesson.title)
    ]);
    list.appendChild(row);
  });
  wrap.appendChild(list);

  const weak = weakConceptTitles(topic);
  if (weak.length > 0) {
    const reviewBtn = el("button", { class: "btn-ghost", style: "margin-top:16px;" },
      `🔄 Review what you've missed (${weak.length} concept${weak.length===1?"":"s"})`);
    reviewBtn.addEventListener("click", () => openReviewLesson(topic.id));
    wrap.appendChild(reviewBtn);
  }
  return wrap;
}

function LessonView() {
  const wrap = document.createDocumentFragment();
  const topic = state.topics[state.activeTopicId];
  if (!topic) { state.view = "home"; return wrap; }
  const idx = state.activeLessonIndex;
  const lesson = topic.lessons[idx];

  wrap.appendChild(el("span", { class: "backlink", onclick: () => { state.view = "curriculum"; render(); } }, "← " + topic.title));

  const view = el("div", { class: "lesson-view" });
  view.appendChild(el("h2", {}, lesson.title));

  if (lesson.content) {
    const nextKey = topic.id + ":" + (idx + 1);
    const hasNext = idx + 1 < topic.lessons.length;
    if (hasNext && prefetchStatus[nextKey]) {
      const s = prefetchStatus[nextKey];
      view.appendChild(el("div", {
        style: "font-family:-apple-system,sans-serif;font-size:12px;color:#8a8578;margin-bottom:12px;display:flex;align-items:center;gap:6px;"
      }, s === "loading"
        ? [el("div", { class: "spinner", style: "width:11px;height:11px;border-width:1.5px;" }), el("span", {}, "Preparing your next lesson in the background...")]
        : "✓ Next lesson is ready — it'll open instantly"
      ));
    }
    if (lesson.imageUrl) {
      const img = el("img", { class: "lesson-img", src: lesson.imageUrl, alt: lesson.title, loading: "lazy" });
      img.addEventListener("error", () => { img.style.display = "none"; });
      view.appendChild(img);
    }
    const body = el("div", { class: "lesson-body" });
    body.innerHTML = lesson.content;
    view.appendChild(body);

    let quizResults = []; // track this viewing's answers to decide on adaptive bridge lesson
    if (lesson.quiz && lesson.quiz.length) {
      view.appendChild(el("h3", { style: "font-family:-apple-system,sans-serif;font-size:15px;text-transform:uppercase;letter-spacing:1px;color:var(--moss);margin-top:22px;" }, "Quick check"));
      lesson.quiz.forEach((q, qi) => {
        const qBox = el("div", { style: "margin-bottom:14px;" });
        qBox.appendChild(el("p", { style: "font-weight:600;margin-bottom:6px;" }, q.question));
        const optWrap = el("div", { style: "display:flex;flex-direction:column;gap:6px;" });
        q.options.forEach((opt, oi) => {
          const optBtn = el("button", { class: "btn-ghost", style: "text-align:left;" }, opt);
          optBtn.addEventListener("click", () => {
            const correct = oi === q.correctIndex;
            optBtn.style.background = correct ? "#e3efe6" : "#fbeee8";
            optBtn.insertAdjacentHTML("beforeend", `<div style="font-family:-apple-system,sans-serif;font-size:12px;margin-top:4px;font-weight:400;">${correct ? "✓ Correct — " : "✗ "}${q.explanation}</div>`);
            recordQuizAnswer(topic.id, lesson.title, q.question, correct);
            track("quiz_answered", { topic: topic.title, correct });
            quizResults[qi] = correct;
          });
          optWrap.appendChild(optBtn);
        });
        qBox.appendChild(optWrap);
        view.appendChild(qBox);
      });
    }

    if (!lesson.done) {
      const doneBtn = el("button", { class: "btn-primary", style: "margin-top:16px;" }, "Mark lesson complete");
      doneBtn.addEventListener("click", () => {
        const answered = quizResults.filter(r => r !== undefined);
        const correctCount = answered.filter(Boolean).length;
        const scoreLow = answered.length > 0 && (correctCount / answered.length) < 0.5;
        markLessonDone(topic.id, idx);
        if (scoreLow && !lesson.isReview) {
          state.error = null;
          openReviewLesson(topic.id); // adaptive: low score triggers an immediate targeted bridge lesson
        }
      });
      view.appendChild(doneBtn);
    }

    // Chat panel
    const chatPanel = el("div", { class: "chat-panel" });
    chatPanel.appendChild(el("label", { class: "field-label" }, "Ask about this lesson"));
    const quick = el("div", { class: "quick-actions" });
    ["Explain differently", "Give another example", "Go deeper", "Quiz me more"].forEach(qa => {
      const b = el("button", { class: "btn-ghost" }, qa);
      b.addEventListener("click", () => sendChat(topic.id, idx, null, qa));
      quick.appendChild(b);
    });
    chatPanel.appendChild(quick);

    const key = topic.id + ":" + idx;
    const log = state.chatByLesson[key] || [];
    const logDiv = el("div", { class: "chat-log" });
    log.forEach(m => {
      const bubble = el("div", { class: "msg " + m.role });
      const paras = String(m.text).split(/\n\s*\n/).filter(p => p.trim());
      if (paras.length <= 1) {
        bubble.textContent = m.text;
      } else {
        paras.forEach(p => bubble.appendChild(el("p", { style: "margin:0 0 8px;" }, p.trim())));
        bubble.lastChild.style.marginBottom = "0";
      }
      logDiv.appendChild(bubble);
    });
    chatPanel.appendChild(logDiv);

    const inputRow = el("div", { class: "row" });
    const chatInput = el("input", { type: "text", placeholder: "Ask a question..." });
    const sendBtn = el("button", { class: "btn-primary" }, "Send");
    const doSend = () => { const v = chatInput.value; chatInput.value = ""; sendChat(topic.id, idx, v); };
    sendBtn.addEventListener("click", doSend);
    chatInput.addEventListener("keydown", e => { if (e.key === "Enter") doSend(); });
    inputRow.appendChild(chatInput);
    inputRow.appendChild(sendBtn);
    chatPanel.appendChild(inputRow);

    view.appendChild(chatPanel);
  }

  wrap.appendChild(view);
  return wrap;
}

function applyTheme() {
  const saved = localStorage.getItem("learn-anything-theme");
  const dark = saved ? saved === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
  document.body.classList.toggle("dark", dark);
}
function toggleTheme() {
  const isDark = document.body.classList.contains("dark");
  document.body.classList.toggle("dark", !isDark);
  localStorage.setItem("learn-anything-theme", !isDark ? "dark" : "light");
  render();
}
applyTheme();
loadTopics();
</script>
